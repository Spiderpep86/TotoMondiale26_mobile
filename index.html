<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toto Mondiali 2026</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">🏆</div>
  <h1>Toto Mondiali 2026</h1>
  <p id="faseAttuale">Pronostici tra amici</p>
</header>

<!-- DASHBOARD -->
<section class="dashboard">

  <div class="card">
    <div class="label">Giocatori</div>
    <div id="totGiocatori" class="value">0</div>
  </div>

  <div class="card">
    <div class="label">Eventi</div>
    <div id="totEventi" class="value">0</div>
  </div>

  <div class="card">
    <div class="label">Conclusi</div>
    <div id="conclusi" class="value">0</div>
  </div>

  <div class="card">
    <div class="label">In attesa</div>
    <div id="attesa" class="value">0</div>
  </div>

</section>

<!-- CLASSIFICA -->
<section class="section">
  <h2>🏆 Classifica</h2>
  <div id="classifica"></div>
</section>

<!-- EVENTI -->
<section class="section">
  <h2>⚽ Eventi</h2>
  <div id="eventi"></div>
</section>

<script src="script.js"></script>

</body>
</html>
